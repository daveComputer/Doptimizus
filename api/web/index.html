<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Doptimizus</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/png" href="/static/favicon_doptimizus.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <header class="site-header">
        <div class="header-content">            
            <img src="/static/titre_doptimizus.png" alt="Doptimizus - Optimisation Stuff Dofus" class="title-img">
        </div>
    </header>
    <div class="main-container">

        <div class="header-section">
        
            <div class="header-spacer"></div>
            <div id="config-bar">
                <div class="config-group">
                    <label for="char-level">Niveau (1-200) :</label>
                    <input type="number" id="char-level" min="1" max="200" value="200">
                </div>

                <div class="config-group">
                    <label>Éléments :</label>
                    <div class="checkbox-list">
                        <label><input type="checkbox" class="element-check" value="Force"> Terre</label>

                        <label><input type="checkbox" class="element-check" value="Intelligence"> Feu</label>

                        <label><input type="checkbox" class="element-check" value="Chance"> Eau</label>

                        <label><input type="checkbox" class="element-check" value="Agilité"> Air</label>
                    </div>
                </div>

                <div class="config-group">
                    <label for="base-damage">Dégâts de base : <span class="info-icon" data-tooltip="Exemple: Pour un Zobal de niveau 18 Terre/Air, on utilise 3 sorts pour taper (Rétention, Martelo et Appui).&#10;Rétention Niveau 4 tape entre 17 et 21 donc 19 en moyenne.&#10;Martelo Niveau 4 tape 19.5.&#10;Appui Niveau 4 tape 5.5 Terre et 5.5 Air (on ne compte pas la ligne de dégats Eau).&#10;On peut estimer qu'on utilisera autant Martelo que Rétention car le premier tape en zone mais le second a plus de Portée tandis que Appui est 4 fois moins utilisé.&#10;On a donc une moyenne m = (19x4 + 19.5x4 + 5.5 + 5.5) / 10 = 16.5">ⓘ</span></label>
                    <input type="number" id="base-damage" value="30">
                </div>
            </div>

            <aside id="weights-container" class="hidden-initially">
                <h3>Poids modifiés<span class="info-icon" data-tooltip="Ces poids sont le produit de la désirabilité (calculée à partir de votre configuration de graphique) et de la rareté naturelle de la statistique (poids de forgemagie). Les poids sont déjà optimisés pour le PVP: la Vitalité et les PA/PM sont surévalués pour donner des stuffs viables">ⓘ</span></h3>
                <div id="weights-list">
                    </div>
            </aside>
        </div>

        <hr style="border: 0; border-top: 1px solid #30363d; margin: 20px 0;">

        <div class="workspace-container">
        
            <div id="left-panel" class="side-panel hidden-initially">
                <h3>Top Items<span class="info-icon" data-tooltip="Cliquer sur un élément permet de voir la répartition des statistiques qu'il donne. Cette répartition n'est pas influencée par vos paramètres, elle ne dépend que des poids de forgemagie">ⓘ</span></h3>
                <div id="top-items-list" class="scrollable-list"></div>
            </div>

            <div class="chart-panel">
                <div class="chart-help-btn info-icon" data-tooltip="Ces pourcentages représentent la part de désirabilité que vous accordez à chaque statistique. Un axe à 20% signifiera que le poids de la statistique associée sera 2 fois plus valorisé que celui de la statistique associée à un autre axe à 10%">?
                </div>
                <div id="chart"></div>

                <div id="error-msg-container" style="display: none;">
                    <span id="error-text"></span>
                </div>
                <div id="controls">
                    <button id="export-btn" class="export-btn">Confirmer et Optimiser</button>
                </div>
            </div>

            <div id="right-panel" class="side-panel hidden-initially">
                <h3>Compositions<span class="info-icon" data-tooltip="Cliquer sur un élément permet de voir la répartition des statistiques qu'il donne. Cette répartition n'est pas influencée par vos paramètres, elle ne dépend que des poids de forgemagie">ⓘ</span></h3>
                <div id="top-stuffs-list" class="scrollable-list"></div>
            </div>
        </div>
    </div>
    <div id="blacklist-section" class="main-container" style="display: none; margin-top: 50px; border-top: 1px solid #30363d; padding-top: 30px;">
        <h3 style="color: #8b949e; text-align: center;">Gestion de la Blacklist</h3>
        <div id="blacklist-container" class="blacklist-grid">
            </div>
    </div>
    <section id="feedback-section">
        <div class="comment-form">
            <h3>Laisser un commentaire</h3>
            <textarea id="comm-message" rows="6" placeholder="Votre message..."></textarea>  
            <button id="btn-envoyer">Envoyer</button>
        </div>

    </section>

    <script src="/static/d3.min.js"></script>
    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
